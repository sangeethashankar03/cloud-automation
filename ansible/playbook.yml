---
- name: Configure EC2 and deploy Docker app
  hosts: web
  become: yes

  tasks:

    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - curl
        state: present

    - name: Install Docker using official script
      shell: curl -fsSL https://get.docker.com | sh

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create app directory
      file:
        path: /home/ubuntu/app
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy app files
      copy:
        src: ../app/
        dest: /home/ubuntu/app/
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Build Docker image
      command: docker build -t myapp /home/ubuntu/app

    - name: Stop existing container (if running)
      shell: docker stop myapp_container || true

    - name: Remove existing container (if exists)
      shell: docker rm myapp_container || true

    - name: Run Docker container
      command: docker run -d -p 80:80 --name myapp_container myapp
