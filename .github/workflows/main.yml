name: Automated EC2 Deployment 

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/aws-key.pem
          chmod 600 ~/.ssh/aws-key.pem
          ssh-keyscan -H ${{ secrets.EC2_IP }} >> ~/.ssh/known_hosts

      - name: Deploy 
        run: |
          rsync -avz -e "ssh -i ~/.ssh/aws-key.pem" app/index.html ubuntu@${{ secrets.EC2_IP }}:/var/www/html/index.html

      - name: Reload nginx
        run: |
          ssh -i ~/.ssh/aws-key.pem ubuntu@${{ secrets.EC2_IP }} "sudo systemctl reload nginx"
